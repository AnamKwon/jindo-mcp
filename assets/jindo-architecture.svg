<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1010 800" width="1010" height="800" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>JINDO architecture: the MCP host drives a plan/plan_next/dispatch/plan_record loop against JINDO's MCP tool layer, which calls a read-only planner only on plan() and dispatches steps through router to agent CLIs; by default the result returns/stores directly with no gate, and Optional Review / Verify is a dashed side branch entered only when the host supplies review=true or verify commands, before shared file-locked state</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3a9188"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b9895f"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1010" height="800" fill="#fdfaf3"/>

  <!-- Host-driven loop (the driver) -->
  <rect x="30" y="30" width="950" height="230" rx="16" fill="none" stroke="#3a9188" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="50" y="55" font-size="14" font-weight="700" fill="#1f3d3a">MCP Host / Host Agent</text>
  <text x="50" y="72" font-size="11" fill="#4d6f6a">drives the multi-step loop — JINDO does not execute the plan itself</text>

  <rect x="50" y="90" width="140" height="55" rx="12" fill="#eaf6f1" stroke="#3a9188" stroke-width="2"/>
  <text x="120" y="113" text-anchor="middle" font-size="12" font-weight="600" fill="#1f3d3a">plan(goal)</text>
  <text x="120" y="129" text-anchor="middle" font-size="10" fill="#4d6f6a">1. establish plan</text>

  <rect x="230" y="90" width="140" height="55" rx="12" fill="#eaf6f1" stroke="#3a9188" stroke-width="2"/>
  <text x="300" y="113" text-anchor="middle" font-size="12" font-weight="600" fill="#1f3d3a">plan_next</text>
  <text x="300" y="129" text-anchor="middle" font-size="10" fill="#4d6f6a">2. get next step</text>

  <rect x="410" y="90" width="140" height="55" rx="12" fill="#eaf6f1" stroke="#3a9188" stroke-width="2"/>
  <text x="480" y="113" text-anchor="middle" font-size="12" font-weight="600" fill="#1f3d3a">dispatch step</text>
  <text x="480" y="129" text-anchor="middle" font-size="10" fill="#4d6f6a">3. host runs it</text>

  <rect x="590" y="90" width="140" height="55" rx="12" fill="#eaf6f1" stroke="#3a9188" stroke-width="2"/>
  <text x="660" y="113" text-anchor="middle" font-size="12" font-weight="600" fill="#1f3d3a">plan_record</text>
  <text x="660" y="129" text-anchor="middle" font-size="10" fill="#4d6f6a">4. save outcome</text>

  <rect x="590" y="165" width="140" height="50" rx="12" fill="#ffffff" stroke="#3a9188" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="660" y="186" text-anchor="middle" font-size="12" font-weight="600" fill="#1f3d3a">plan_revise</text>
  <text x="660" y="202" text-anchor="middle" font-size="10" fill="#4d6f6a">5. optional</text>

  <!-- loop chain arrows -->
  <line x1="190" y1="117" x2="228" y2="117" stroke="#3a9188" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="370" y1="117" x2="408" y2="117" stroke="#3a9188" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="550" y1="117" x2="588" y2="117" stroke="#3a9188" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="700" y1="145" x2="700" y2="163" stroke="#3a9188" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>

  <!-- feedback / repeat curve: plan_record -> plan_next -->
  <path d="M700,145 C700,238 300,238 300,148" fill="none" stroke="#3a9188" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="500" y="252" text-anchor="middle" font-size="10" fill="#4d6f6a">repeats until plan_next reports no steps remain</text>

  <!-- JINDO MCP Server / Tool Layer -->
  <rect x="30" y="290" width="950" height="90" rx="16" fill="#fbe7a1" stroke="#e0a92c" stroke-width="2"/>
  <text x="505" y="320" text-anchor="middle" font-size="14" font-weight="700" fill="#5a4412">JINDO MCP Server / Tool Layer</text>
  <text x="505" y="342" text-anchor="middle" font-size="11" fill="#7a5f1c">exposes: plan · plan_next · plan_record · plan_revise · dispatch</text>
  <text x="505" y="360" text-anchor="middle" font-size="11" fill="#7a5f1c">stores active plan state — does not run the loop itself</text>

  <!-- loop -> server calls -->
  <line x1="120" y1="145" x2="120" y2="288" stroke="#3a9188" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="300" y1="145" x2="300" y2="288" stroke="#3a9188" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="480" y1="145" x2="480" y2="288" stroke="#3a9188" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="660" y1="145" x2="660" y2="288" stroke="#3a9188" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="700" y1="215" x2="700" y2="288" stroke="#3a9188" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>

  <!-- Read-only Planner Agent (plan() only) -->
  <rect x="30" y="430" width="260" height="110" rx="14" fill="#efe8fb" stroke="#8a6fbd" stroke-width="2"/>
  <text x="160" y="460" text-anchor="middle" font-size="13" font-weight="700" fill="#3f2e66">Read-only Planner Agent</text>
  <text x="160" y="481" text-anchor="middle" font-size="11" fill="#5c4a85">decomposes goal into ordered</text>
  <text x="160" y="497" text-anchor="middle" font-size="11" fill="#5c4a85">steps — invoked only by plan()</text>
  <text x="160" y="516" text-anchor="middle" font-size="11" fill="#5c4a85">result saved as active plan state</text>

  <line x1="150" y1="380" x2="150" y2="428" stroke="#8a6fbd" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>
  <text x="230" y="402" text-anchor="middle" font-size="10" fill="#5c4a85">plan() only</text>

  <!-- Dispatch path: Router -> Agent CLIs; default returns directly, optional gate is a side branch -->
  <rect x="340" y="430" width="170" height="70" rx="12" fill="#ffffff" stroke="#3a9188" stroke-width="2"/>
  <text x="425" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#1f3d3a">Router / Model</text>
  <text x="425" y="478" text-anchor="middle" font-size="12" font-weight="600" fill="#1f3d3a">Selection</text>

  <line x1="480" y1="380" x2="425" y2="428" stroke="#3a9188" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="500" y="410" text-anchor="middle" font-size="10" fill="#4d6f6a">dispatch(step)</text>

  <rect x="560" y="405" width="150" height="42" rx="10" fill="#ffffff" stroke="#3a9188" stroke-width="2"/>
  <text x="635" y="430" text-anchor="middle" font-size="12" fill="#1f3d3a">Claude CLI</text>

  <rect x="560" y="458" width="150" height="42" rx="10" fill="#ffffff" stroke="#3a9188" stroke-width="2"/>
  <text x="635" y="483" text-anchor="middle" font-size="12" fill="#1f3d3a">Codex CLI</text>

  <rect x="560" y="511" width="150" height="42" rx="10" fill="#ffffff" stroke="#3a9188" stroke-width="2"/>
  <text x="635" y="536" text-anchor="middle" font-size="12" fill="#1f3d3a">Gemini / agy</text>

  <line x1="510" y1="450" x2="558" y2="426" stroke="#3a9188" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="465" x2="558" y2="479" stroke="#3a9188" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="480" x2="558" y2="532" stroke="#3a9188" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Agent results converge before branching into default vs optional gate paths. -->
  <line x1="710" y1="426" x2="748" y2="480" stroke="#3a9188" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="710" y1="479" x2="748" y2="480" stroke="#3a9188" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="710" y1="532" x2="748" y2="480" stroke="#3a9188" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="750" cy="480" r="4" fill="#3a9188"/>

  <!-- Default path: agent result -> Shared state, no gate unless requested -->
  <path d="M750,480 C 560,535 520,640 520,708" fill="none" stroke="#3a9188" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="430" y="620" text-anchor="middle" font-size="10" fill="#1f3d3a">default: return/store result</text>
  <text x="430" y="634" text-anchor="middle" font-size="10" fill="#7a938e">no gate unless requested</text>

  <!-- Optional side branch: Review / Verify gate (only entered on request) -->
  <path d="M750,480 C 820,535 735,575 670,588" fill="none" stroke="#b9895f" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>
  <text x="500" y="574" text-anchor="middle" font-size="10" fill="#8a5a2a">side branch: review=true</text>
  <text x="500" y="588" text-anchor="middle" font-size="10" fill="#8a5a2a">or verify commands</text>

  <rect x="560" y="590" width="220" height="100" rx="14" fill="#eaf6f1" stroke="#b9895f" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="670" y="614" text-anchor="middle" font-size="13" font-weight="600" fill="#1f3d3a">Optional Review / Verify</text>
  <text x="670" y="634" text-anchor="middle" font-size="11" fill="#4d6f6a">peer review — review=true</text>
  <text x="670" y="650" text-anchor="middle" font-size="11" fill="#4d6f6a">objective checks — verify commands</text>
  <text x="670" y="668" text-anchor="middle" font-size="10" fill="#7a938e">dashed side branch, not a required stage</text>

  <line x1="670" y1="690" x2="670" y2="708" stroke="#b9895f" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>

  <!-- Shared, file-locked state -->
  <rect x="30" y="710" width="950" height="60" rx="14" fill="#fdeedb" stroke="#d98c3f" stroke-width="2"/>
  <text x="505" y="733" text-anchor="middle" font-size="13" font-weight="700" fill="#6b3f16">Shared, file-locked state</text>
  <text x="505" y="752" text-anchor="middle" font-size="11" fill="#8a5a2a">memory.json · plan.json (active plan state) · dispatch.log (audit trail)</text>

  <line x1="200" y1="380" x2="200" y2="708" stroke="#b9895f" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-dashed)"/>
  <text x="270" y="696" text-anchor="middle" font-size="10" fill="#8a5a2a">plan.json</text>
</svg>
