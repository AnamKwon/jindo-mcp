<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1010 800" width="1010" height="800" font-family="-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <title>JINDO architecture: the MCP host drives a plan/plan_next/dispatch/plan_record loop (with optional plan_revise) and calls these as MCP tools against the JINDO server; the server invokes a read-only planner only on plan() and routes dispatch through model selection to the agent CLIs (Claude/Codex/Gemini). Agent results converge and by default return/store directly with no gate; Optional Review/Verify is a dashed side branch entered only when the host passes review=true or verify commands. All tiers persist to shared, file-locked state (memory.json incl. the cross-agent insight layer, plan.json, dispatch.log).</title>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3a9188"/>
    </marker>
    <marker id="arrow-purple" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#8a6fbd"/>
    </marker>
    <marker id="arrow-dashed" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#b9895f"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="1010" height="800" fill="#fdfaf3"/>

  <!-- ===================== Host-driven loop (the driver) ===================== -->
  <rect x="30" y="30" width="950" height="250" rx="16" fill="none" stroke="#3a9188" stroke-width="2" stroke-dasharray="6 5"/>
  <text x="50" y="58" font-size="14" font-weight="700" fill="#1f3d3a">MCP Host / Host Agent</text>
  <text x="50" y="76" font-size="11" fill="#4d6f6a">drives the multi-step loop and calls JINDO's tools — JINDO does not run the loop itself</text>

  <rect x="55" y="96" width="140" height="52" rx="12" fill="#eaf6f1" stroke="#3a9188" stroke-width="2"/>
  <text x="125" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#1f3d3a">plan(goal)</text>
  <text x="125" y="134" text-anchor="middle" font-size="10" fill="#4d6f6a">1. establish plan</text>

  <rect x="250" y="96" width="140" height="52" rx="12" fill="#eaf6f1" stroke="#3a9188" stroke-width="2"/>
  <text x="320" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#1f3d3a">plan_next</text>
  <text x="320" y="134" text-anchor="middle" font-size="10" fill="#4d6f6a">2. get next step</text>

  <rect x="445" y="96" width="140" height="52" rx="12" fill="#eaf6f1" stroke="#3a9188" stroke-width="2"/>
  <text x="515" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#1f3d3a">dispatch step</text>
  <text x="515" y="134" text-anchor="middle" font-size="10" fill="#4d6f6a">3. host runs it</text>

  <rect x="640" y="96" width="140" height="52" rx="12" fill="#eaf6f1" stroke="#3a9188" stroke-width="2"/>
  <text x="710" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#1f3d3a">plan_record</text>
  <text x="710" y="134" text-anchor="middle" font-size="10" fill="#4d6f6a">4. save outcome</text>

  <rect x="805" y="96" width="130" height="52" rx="12" fill="#ffffff" stroke="#3a9188" stroke-width="2" stroke-dasharray="4 3"/>
  <text x="870" y="118" text-anchor="middle" font-size="12" font-weight="600" fill="#1f3d3a">plan_revise</text>
  <text x="870" y="134" text-anchor="middle" font-size="10" fill="#4d6f6a">5. optional</text>

  <!-- loop-order arrows (left to right) -->
  <line x1="195" y1="122" x2="248" y2="122" stroke="#3a9188" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="390" y1="122" x2="443" y2="122" stroke="#3a9188" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="585" y1="122" x2="638" y2="122" stroke="#3a9188" stroke-width="2" marker-end="url(#arrow)"/>
  <line x1="780" y1="122" x2="803" y2="122" stroke="#3a9188" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>

  <!-- feedback / repeat curve (routed entirely below the boxes, no crossings) -->
  <path d="M710,148 C710,214 320,214 320,150" fill="none" stroke="#3a9188" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="515" y="238" text-anchor="middle" font-size="10" fill="#4d6f6a">repeats until plan_next reports no steps remain</text>

  <!-- single "tool calls" arrow from the host loop down into the server -->
  <line x1="505" y1="280" x2="505" y2="303" stroke="#3a9188" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="516" y="296" font-size="10" fill="#4d6f6a">calls as MCP tools</text>

  <!-- ===================== JINDO MCP Server / Tool Layer ===================== -->
  <rect x="30" y="305" width="950" height="90" rx="16" fill="#fbe7a1" stroke="#e0a92c" stroke-width="2"/>
  <text x="505" y="335" text-anchor="middle" font-size="14" font-weight="700" fill="#5a4412">JINDO MCP Server / Tool Layer</text>
  <text x="505" y="357" text-anchor="middle" font-size="11" fill="#7a5f1c">exposes: plan · plan_next · plan_record · plan_revise · dispatch</text>
  <text x="505" y="375" text-anchor="middle" font-size="11" fill="#7a5f1c">stores active plan state — does not run the loop itself</text>

  <!-- server -> read-only planner (plan() only) -->
  <line x1="150" y1="395" x2="150" y2="428" stroke="#8a6fbd" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-purple)"/>
  <text x="163" y="418" font-size="10" fill="#5c4a85">plan() only</text>

  <!-- server -> router (dispatch) -->
  <line x1="425" y1="395" x2="425" y2="428" stroke="#3a9188" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="436" y="418" font-size="10" fill="#4d6f6a">dispatch(step)</text>

  <!-- ===================== Read-only Planner Agent ===================== -->
  <rect x="30" y="430" width="260" height="115" rx="14" fill="#efe8fb" stroke="#8a6fbd" stroke-width="2"/>
  <text x="160" y="461" text-anchor="middle" font-size="13" font-weight="700" fill="#3f2e66">Read-only Planner Agent</text>
  <text x="160" y="483" text-anchor="middle" font-size="11" fill="#5c4a85">decomposes goal into ordered</text>
  <text x="160" y="499" text-anchor="middle" font-size="11" fill="#5c4a85">steps — invoked only by plan()</text>
  <text x="160" y="521" text-anchor="middle" font-size="11" fill="#5c4a85">result saved as active plan state</text>

  <!-- ===================== Router + Agent CLIs ===================== -->
  <rect x="340" y="430" width="170" height="70" rx="12" fill="#ffffff" stroke="#3a9188" stroke-width="2"/>
  <text x="425" y="462" text-anchor="middle" font-size="12" font-weight="600" fill="#1f3d3a">Router / Model</text>
  <text x="425" y="478" text-anchor="middle" font-size="12" font-weight="600" fill="#1f3d3a">Selection</text>

  <rect x="560" y="405" width="150" height="42" rx="10" fill="#ffffff" stroke="#3a9188" stroke-width="2"/>
  <text x="635" y="430" text-anchor="middle" font-size="12" fill="#1f3d3a">Claude CLI</text>

  <rect x="560" y="458" width="150" height="42" rx="10" fill="#ffffff" stroke="#3a9188" stroke-width="2"/>
  <text x="635" y="483" text-anchor="middle" font-size="12" fill="#1f3d3a">Codex CLI</text>

  <rect x="560" y="511" width="150" height="42" rx="10" fill="#ffffff" stroke="#3a9188" stroke-width="2"/>
  <text x="635" y="536" text-anchor="middle" font-size="12" fill="#1f3d3a">Gemini / agy</text>

  <!-- router -> CLIs (fan out) -->
  <line x1="510" y1="452" x2="558" y2="426" stroke="#3a9188" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="466" x2="558" y2="479" stroke="#3a9188" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="510" y1="480" x2="558" y2="532" stroke="#3a9188" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- CLIs -> convergence point (fan in) -->
  <line x1="710" y1="426" x2="748" y2="480" stroke="#3a9188" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="710" y1="479" x2="748" y2="480" stroke="#3a9188" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="710" y1="532" x2="748" y2="480" stroke="#3a9188" stroke-width="1.5" marker-end="url(#arrow)"/>
  <circle cx="750" cy="480" r="4" fill="#3a9188"/>

  <!-- default path: result -> shared state, dropped straight down the clear -->
  <!-- channel between the CLI stack (x<=710) and the Optional box (x>=770) -->
  <path d="M750,480 C745,560 735,655 726,718" fill="none" stroke="#3a9188" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="690" y="628" text-anchor="end" font-size="10" font-weight="600" fill="#1f3d3a">default</text>
  <text x="690" y="643" text-anchor="end" font-size="10" fill="#4d6f6a">return / store result</text>
  <text x="690" y="657" text-anchor="end" font-size="10" fill="#7a938e">no gate unless requested</text>

  <!-- optional side branch: Review / Verify gate (only on request), to the right -->
  <path d="M750,480 C800,515 850,555 858,593" fill="none" stroke="#b9895f" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>

  <rect x="770" y="595" width="220" height="95" rx="14" fill="#eaf6f1" stroke="#b9895f" stroke-width="2" stroke-dasharray="6 4"/>
  <text x="880" y="619" text-anchor="middle" font-size="13" font-weight="600" fill="#1f3d3a">Optional Review / Verify</text>
  <text x="880" y="639" text-anchor="middle" font-size="11" fill="#4d6f6a">peer review — review=true</text>
  <text x="880" y="655" text-anchor="middle" font-size="11" fill="#4d6f6a">objective checks — verify commands</text>
  <text x="880" y="673" text-anchor="middle" font-size="10" fill="#7a938e">dashed side branch, not a required stage</text>

  <line x1="880" y1="690" x2="880" y2="718" stroke="#b9895f" stroke-width="1.5" stroke-dasharray="4 3" marker-end="url(#arrow-dashed)"/>

  <!-- ===================== Shared, file-locked state ===================== -->
  <rect x="30" y="720" width="950" height="60" rx="14" fill="#fdeedb" stroke="#d98c3f" stroke-width="2"/>
  <text x="505" y="743" text-anchor="middle" font-size="13" font-weight="700" fill="#6b3f16">Shared, file-locked state</text>
  <text x="505" y="762" text-anchor="middle" font-size="11" fill="#8a5a2a">memory.json (task log + cross-agent insights) · plan.json (active plan state) · dispatch.log (audit trail)</text>

  <!-- plan state persistence (routed in the clear channel between Planner and Router) -->
  <line x1="310" y1="395" x2="310" y2="718" stroke="#b9895f" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrow-dashed)"/>
  <text x="318" y="575" font-size="10" fill="#8a5a2a">plan.json</text>
</svg>
